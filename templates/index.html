<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Object Detection System</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1><i class="fas fa-video"></i> YOLO Object Detection System</h1>
        <p class="team-info">Mujtaba Zaheer BSE231010, Ayesha Babar BSE231036, Sameer Sajid BSE231035</p>
    </header>

    <main>
        <section id="actions-section">
            <h2><i class="fas fa-keyboard"></i> Actions</h2>
            <div id="action-buttons">
                <button class="action" onclick="startDetection()"><i class="fas fa-play"></i> Start Detection (Space)</button>
                <button class="action" onclick="stopDetection()"><i class="fas fa-stop"></i> Stop Detection (Esc)</button>
                <button class="action" onclick="showCameras()"><i class="fas fa-search"></i> Scan for Cameras (S)</button>
                <div class="camera-actions">
                    <button id="cameraToggleButton" class="toggle-off" onclick="toggleCamera()"><i class="fas fa-power-off"></i> Turn Camera On (C)</button>
                    <div id="camera-list">
                        <!-- Cameras will be listed here dynamically -->
                    </div>
                </div>
            </div>
        </section>

        <section id="video-feed-section">
            <h2><i class="fas fa-cctv"></i> Live Feed</h2>
            <div id="video-feed-status">
                <span id="cameraCombinedStatus">Camera OFF | Index: 1</span>
            </div>
            <div id="video-container">
                <img id="video-feed" src="" alt="Video Feed">
            </div>
            <div class="status-message" id="status-message"></div>
        </section>

        <section id="summary-section">
            <h2><i class="fas fa-list-alt"></i> Detected Items Summary</h2>
            <div id="summary-container">
                <table id="summary-table">
                    <thead>
                        <tr>
                            <th>Object</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>Detection not active.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2025 YOLO Object Detection System. All rights reserved.</p>
    </footer>

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
